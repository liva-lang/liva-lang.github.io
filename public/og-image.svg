<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient orb -->
  <circle cx="900" cy="315" r="300" fill="#6366f1" opacity="0.08"/>
  <circle cx="200" cy="500" r="200" fill="#818cf8" opacity="0.05"/>

  <!-- Logo -->
  <rect x="80" y="200" width="80" height="80" rx="18" fill="url(#accent)"/>
  <text x="120" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="48" fill="white">L</text>

  <!-- Title -->
  <text x="190" y="255" font-family="system-ui, sans-serif" font-weight="800" font-size="64" fill="white">Liva</text>

  <!-- Subtitle -->
  <text x="80" y="340" font-family="system-ui, sans-serif" font-weight="500" font-size="32" fill="#94a3b8">Write clean code, compile to Rust</text>

  <!-- Tagline -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-weight="400" font-size="24" fill="#64748b">Python simplicity · Rust performance · Zero runtime overhead</text>

  <!-- Code preview box -->
  <rect x="680" y="160" width="440" height="310" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="708" cy="185" r="6" fill="#f87171"/>
  <circle cx="730" cy="185" r="6" fill="#fbbf24"/>
  <circle cx="752" cy="185" r="6" fill="#4ade80"/>

  <text x="710" y="230" font-family="monospace" font-size="16" fill="#6366f1" font-weight="600">main</text>
  <text x="754" y="230" font-family="monospace" font-size="16" fill="#94a3b8">() {</text>

  <text x="730" y="260" font-family="monospace" font-size="16" fill="#7dd3fc">let</text>
  <text x="766" y="260" font-family="monospace" font-size="16" fill="#e2e8f0"> name = </text>
  <text x="868" y="260" font-family="monospace" font-size="16" fill="#86efac">"World"</text>

  <text x="730" y="290" font-family="monospace" font-size="16" fill="#7dd3fc">let</text>
  <text x="766" y="290" font-family="monospace" font-size="16" fill="#e2e8f0"> nums = [</text>
  <text x="870" y="290" font-family="monospace" font-size="16" fill="#fbbf24">1</text>
  <text x="882" y="290" font-family="monospace" font-size="16" fill="#94a3b8">, </text>
  <text x="900" y="290" font-family="monospace" font-size="16" fill="#fbbf24">2</text>
  <text x="912" y="290" font-family="monospace" font-size="16" fill="#94a3b8">, </text>
  <text x="930" y="290" font-family="monospace" font-size="16" fill="#fbbf24">3</text>
  <text x="942" y="290" font-family="monospace" font-size="16" fill="#94a3b8">]</text>

  <text x="730" y="350" font-family="monospace" font-size="16" fill="#c4b5fd">print</text>
  <text x="778" y="350" font-family="monospace" font-size="16" fill="#94a3b8">(</text>
  <text x="790" y="350" font-family="monospace" font-size="16" fill="#86efac">$"Hello, {</text>
  <text x="920" y="350" font-family="monospace" font-size="16" fill="#e2e8f0">name</text>
  <text x="960" y="350" font-family="monospace" font-size="16" fill="#86efac">}!"</text>
  <text x="1000" y="350" font-family="monospace" font-size="16" fill="#94a3b8">)</text>

  <text x="710" y="380" font-family="monospace" font-size="16" fill="#94a3b8">}</text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
